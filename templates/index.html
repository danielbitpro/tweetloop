<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweet Reviewer</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Login Screen -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>> ACCESS_REQUIRED</h2>
            <input type="password" id="login-password" placeholder="Enter password..." autofocus>
            <button class="btn btn-primary" style="width:100%;" onclick="attemptLogin()">AUTHENTICATE</button>
            <div class="login-error" id="login-error">ACCESS DENIED</div>
        </div>
    </div>

    <!-- Main App -->
    <div class="header">
        <div class="header-terminal-bar">
            <span class="prompt">SYS://</span>
            <span>TWEETLOOP</span>
            <span>|</span>
            <span>UPLINK:</span>
            <span id="uplink-status" class="status-ok">OK</span>
            <span>|</span>
            <span>TWEETS:</span>
            <span id="uplink-count">0</span>
            <span class="cursor-blink"></span>
        </div>
        <div class="header-main">
            <div class="header-title">
                <span class="prefix">&gt;</span> <span class="accent">TWEET</span>_REVIEWER
            </div>
            <div class="header-actions">
                <a href="/settings" class="btn" style="text-decoration: none; color: inherit;">⚙ SETTINGS</a>
                <button class="btn" onclick="fetchTweets()">REFRESH</button>
                <button class="btn btn-primary" onclick="showModal('add-modal')">+ NEW</button>
                <div class="export-dropdown">
                    <button class="btn" onclick="toggleExportMenu()">EXPORT</button>
                    <div class="export-menu" id="export-menu">
                        <button onclick="exportApproved('raw')">→ APPROVED (RAW)</button>
                        <button onclick="exportApproved('csv')">→ APPROVED (CSV)</button>
                        <button onclick="exportPipeline()">→ APPROVED (PIPELINE)</button>
                        <button onclick="exportAll('json')">→ ALL (JSON)</button>
                        <button onclick="exportAll('csv')">→ ALL (CSV)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Summary Bar -->
        <div id="summary-bar" class="summary-bar"></div>

        <!-- Search & Filter Bar -->
        <div class="search-bar">
            <input type="text" class="search-input" id="search-input" placeholder="> SEARCH TWEETS..." oninput="renderFilteredTweets()">
            <select class="filter-select" id="filter-status" onchange="renderFilteredTweets()">
                <option value="">[ALL STATUS]</option>
                <option value="draft">[DRAFT]</option>
                <option value="approved">[APPROVED]</option>
                <option value="scheduled">[SCHEDULED]</option>
                <option value="posted">[POSTED]</option>
                <option value="manual">[MANUAL]</option>
            </select>
            <select class="filter-select" id="filter-label" onchange="renderFilteredTweets()">
                <option value="">[ALL LABELS]</option>
            </select>
            <button class="btn btn-sm" onclick="toggleBulkMode()" id="bulk-mode-btn">[BULK]</button>
        </div>

        <!-- Bulk Action Bar -->
        <div class="bulk-bar" id="bulk-bar">
            <span><span class="bulk-count" id="bulk-count">0</span> selected</span>
            <div class="bulk-actions">
                <button class="btn btn-sm btn-danger" onclick="bulkDelete()">DELETE</button>
                <button class="btn btn-sm btn-cyan" onclick="bulkApprove()">APPROVE</button>
            </div>
        </div>

        <!-- Tweet List -->
        <div id="tweet-list"></div>
    </div>

    <!-- Add Tweet Modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <div class="modal-header">
                <span>> ADD_NEW_TWEET</span>
                <button class="btn btn-sm" onclick="hideModal('add-modal')">X</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Label</label>
                    <input type="text" id="new-tweet-label" placeholder="Local LLM">
                </div>
                <div class="form-group">
                    <label>Tweet Text</label>
                    <div class="emoji-input-wrapper">
                        <textarea id="new-tweet-text" placeholder="Enter your tweet..." oninput="updateNewCharCount()" onpaste="handleImagePaste(event)"></textarea>
                        <button class="btn btn-sm btn-emoji-trigger" onclick="openEmojiPicker('new-tweet-text')" title="Insert emoji">😀</button>
                        <div class="emoji-picker" id="new-emoji-picker">
                            <input type="text" class="emoji-search" placeholder="Search emoji..." oninput="filterEmojiPicker('new')" aria-label="Search emoji">
                            <div class="emoji-grid" id="new-emoji-grid"></div>
                        </div>
                    </div>
                    <div class="char-counter" id="new-char-counter">
                        <span class="count" id="new-char-count">0</span>
                        <span>/ 280</span>
                        <div class="progress-bar"><div class="fill" id="new-char-bar"></div></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Why it works</label>
                    <textarea id="new-tweet-why" placeholder="Why this will resonate..." style="min-height: 60px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Schedule Time</label>
                    <input type="datetime-local" id="new-tweet-time">
                </div>
                <div class="form-group">
                    <label>Hashtags</label>
                    <input type="text" id="new-tweet-hashtags" placeholder="#LocalAI #LLM">
                </div>
                <button class="btn btn-primary" onclick="addTweet()">ADD_TWEET</button>
            </div>
        </div>
    </div>

    <!-- Edit Tweet Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-header">
                <span>> EDIT_TWEET</span>
                <button class="btn btn-sm" onclick="hideModal('edit-modal')">X</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Label</label>
                    <input type="text" id="edit-tweet-label" placeholder="Local LLM">
                </div>
                <div class="form-group">
                    <label>Tweet Text</label>
                    <div class="emoji-input-wrapper">
                        <textarea id="edit-tweet-text" placeholder="Enter your tweet..." oninput="updateEditCharCount()" onpaste="handleImagePaste(event)"></textarea>
                        <button class="btn btn-sm btn-emoji-trigger" onclick="openEmojiPicker('edit-tweet-text')" title="Insert emoji">😀</button>
                        <div class="emoji-picker" id="edit-emoji-picker">
                            <input type="text" class="emoji-search" placeholder="Search emoji..." oninput="filterEmojiPicker('edit')" aria-label="Search emoji">
                            <div class="emoji-grid" id="edit-emoji-grid"></div>
                        </div>
                    </div>
                    <div class="char-counter" id="edit-char-counter">
                        <span class="count" id="edit-char-count">0</span>
                        <span>/ 280</span>
                        <div class="progress-bar"><div class="fill" id="edit-char-bar"></div></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Why it works</label>
                    <textarea id="edit-tweet-why" placeholder="Why this will resonate..." style="min-height: 60px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Schedule Time</label>
                    <input type="datetime-local" id="edit-tweet-time">
                </div>
                <div class="form-group">
                    <label>Hashtags</label>
                    <input type="text" id="edit-tweet-hashtags" placeholder="#LocalAI #LLM">
                </div>
                <button class="btn btn-primary" onclick="saveEdit()">SAVE_CHANGES</button>
            </div>
        </div>
    </div>

    <!-- Copy Modal (for preview) -->
    <div class="copy-modal-overlay" id="copy-modal">
        <div class="copy-modal">
            <div class="copy-modal-header">
                <span>> COPY_TWEET</span>
                <button class="btn btn-sm" onclick="closeCopyModal()">X</button>
            </div>
            <div class="copy-modal-body">
                <textarea class="copy-modal-textarea" id="copy-modal-textarea" readonly></textarea>
            </div>
            <div class="copy-modal-footer">
                <span class="hint">SELECT_TEXT → CTRL+C</span>
                <button class="btn btn-sm" onclick="closeCopyModal()">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- Tweet Preview Modal -->
    <div class="modal-overlay" id="preview-modal">
        <div class="modal">
            <div class="modal-header">
                <span>> X_PREVIEW</span>
                <button class="btn btn-sm" onclick="hideModal('preview-modal')">X</button>
            </div>
            <div class="modal-body">
                <div class="preview-card" id="preview-content"></div>
            </div>
        </div>
    </div>

    <!-- Copied Toast -->
    <div class="copied-toast" id="copied-toast">> COPIED_TO_CLIPBOARD</div>

    <!-- Action Toast -->
    <div class="action-toast" id="action-toast"></div>

    <script>
        // ── Dynamic emoji picker creation: build them in JS so cached HTML doesn't matter ──
        (function createEmojiPickers() {
            const containers = [
                { id: 'new-emoji-picker', textareaId: 'new-tweet-text' },
                { id: 'edit-emoji-picker', textareaId: 'edit-tweet-text' }
            ];
            containers.forEach(function(c) {
                if (!document.getElementById(c.id)) {
                    var div = document.createElement('div');
                    div.className = 'emoji-picker';
                    div.id = c.id;
                    var textarea = document.getElementById(c.textareaId);
                    if (textarea) textarea.parentNode.insertBefore(div, textarea.nextSibling);
                }
            });
        })();

        // ── Global fetch wrapper: auto-add credentials for /api/* ──
        const originalFetch = window.fetch;
        window.fetch = function(url, options = {}) {
            if (typeof url === 'string' && url.startsWith('/api/')) {
                options.credentials = options.credentials || 'include';
            }
            return originalFetch.call(this, url, options);
        };

        let allTweets = {};
        let bulkMode = false;

        // LOGIN
        let isLoggedIn = false;
        function checkLogin() {
            if (localStorage.getItem('reviewer_auth') === 'true') {
                isLoggedIn = true;
            }
            if (!isLoggedIn) {
                document.getElementById('login-overlay').classList.add('active');
                document.getElementById('login-password').focus();
            } else {
                init();
            }
        }

        function attemptLogin() {
            const password = document.getElementById('login-password').value;
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password }),
                credentials: 'include'
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'authenticated') {
                    localStorage.setItem('reviewer_auth', 'true');
                    isLoggedIn = true;
                    document.getElementById('login-overlay').classList.remove('active');
                    init();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            })
            .catch(() => {
                document.getElementById('login-error').style.display = 'block';
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('login-overlay').classList.contains('active')) {
                attemptLogin();
            }
        });

        // INIT
        function init() {
            fetchTweets();
            populateLabels();
        }

        async function fetchTweets() {
            try {
                const response = await fetch('/api/tweets', { credentials: 'include' });
                if (response.status === 401) {
                    localStorage.removeItem('reviewer_auth');
                    isLoggedIn = false;
                    document.getElementById('login-overlay').classList.add('active');
                    document.getElementById('login-password').focus();
                    document.getElementById('uplink-status').textContent = 'UNAUTH';
                    document.getElementById('uplink-status').className = 'status-warn';
                    return;
                }
                const data = await response.json();
                allTweets = data;
                renderSummary(data);
                renderAllDates(data);
                document.getElementById('uplink-count').textContent = getTweetCount(data);
                document.getElementById('uplink-status').textContent = 'OK';
                document.getElementById('uplink-status').className = 'status-ok';
            } catch (e) {
                document.getElementById('uplink-status').textContent = 'ERR';
                document.getElementById('uplink-status').className = 'status-warn';
            }
        }

        function getTweetCount(data) {
            let count = 0;
            for (const date in data) count += data[date].length;
            return count;
        }

        function renderSummary(data) {
            const container = document.getElementById('summary-bar');
            let total = 0, draft = 0, approved = 0, posted = 0;
            for (const date in data) {
                data[date].forEach(t => {
                    total++;
                    if (t.status === 'draft') draft++;
                    else if (t.status === 'approved') approved++;
                    else if (t.status === 'posted') posted++;
                });
            }
            container.innerHTML = `
                <div class="summary-item total"><div class="count">${total}</div><div class="label">Total</div></div>
                <div class="summary-item draft"><div class="count">${draft}</div><div class="label">Drafts</div></div>
                <div class="summary-item approved"><div class="count">${approved}</div><div class="label">Approved</div></div>
                <div class="summary-item posted"><div class="count">${posted}</div><div class="label">Posted</div></div>
            `;
        }

        function populateLabels() {
            const select = document.getElementById('filter-label');
            const labels = new Set();
            for (const date in allTweets) {
                allTweets[date].forEach(t => {
                    if (t.label) labels.add(t.label);
                });
            }
            const current = select.value;
            select.innerHTML = '<option value="">[ALL LABELS]</option>';
            labels.forEach(label => {
                const opt = document.createElement('option');
                opt.value = label;
                opt.textContent = label;
                select.appendChild(opt);
            });
            select.value = current;
        }

        function renderFilteredTweets() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('filter-status').value;
            const labelFilter = document.getElementById('filter-label').value;

            let filtered = {};
            for (const date in allTweets) {
                const filteredTweets = allTweets[date].filter(t => {
                    if (statusFilter && t.status !== statusFilter) return false;
                    if (labelFilter && t.label !== labelFilter) return false;
                    if (search) {
                        const searchable = [t.text, t.label, t.hashtags, t.why_it_works].join(' ').toLowerCase();
                        if (!searchable.includes(search)) return false;
                    }
                    return true;
                });
                if (filteredTweets.length > 0) {
                    filtered[date] = filteredTweets;
                }
            }

            const container = document.getElementById('tweet-list');
            const dates = Object.keys(filtered).sort((a, b) => b.localeCompare(a));
            if (dates.length === 0) {
                container.innerHTML = '<div class="empty-state"><span class="prompt">&gt;</span> NO_MATCHING_TWEETS_FOUND<span class="cursor-blink"></span></div>';
                return;
            }
            const today = new Date().toISOString().slice(0, 10);
            container.innerHTML = dates.map(date => {
                const tweets = filtered[date];
                const displayDate = new Date(date + 'T00:00:00').toLocaleDateString('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
                const isToday = date === today;
                const collapsedClass = isToday ? '' : 'collapsed';
                return `
                    <div class="date-group">
                        <div class="date-header ${collapsedClass}" onclick="toggleDate('${date}')">
                            <span class="toggle-icon">▼</span>
                            <span class="date-text">${displayDate}</span>
                            <span class="count-badge">${tweets.length} TWEETS</span>
                        </div>
                        <div class="date-tweets ${collapsedClass}" id="tweets-${date}">
                            ${tweets.map(tweet => renderTweet(tweet)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderAllDates(data) {
            renderFilteredTweets();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderTweet(tweet) {
            const charLen = (tweet.text || '').length;
            const charClass = charLen <= 260 ? 'safe' : charLen <= 280 ? 'warn' : 'over';
            const charBarClass = charClass;
            const percent = Math.min((charLen / 280) * 100, 100);

            const labelHtml = tweet.label ? `<span class="tweet-label">${escapeHtml(tweet.label)}</span>` : '';
            const whyHtml = tweet.why_it_works ? `<div class="tweet-why"><strong>WHY_IT_WORKS:</strong> ${escapeHtml(tweet.why_it_works)}</div>` : '';
            const hashtagsHtml = tweet.hashtags ? `<span class="tweet-hashtags">${escapeHtml(tweet.hashtags)}</span>` : '';

            const bulkCheck = bulkMode ? `<input type="checkbox" class="tweet-checkbox" data-id="${tweet.id}" onchange="updateBulkCount()">` : '';

            // Clean the tweet text — strip ">" blockquote markers
            const cleanText = (tweet.text || '').replace(/\n>\n/g, '\n').replace(/>/g, '').trim();

            return `
                <div class="tweet-card ${tweet.status}">
                    <div class="tweet-card-header">
                        <div class="left">
                            ${bulkCheck}
                            ${labelHtml}
                            <span class="status-badge ${tweet.status}">${tweet.status}</span>
                            ${tweet.section_number ? `<span style="color: var(--text-dim);">#${tweet.section_number}</span>` : ''}
                        </div>
                        <div class="right">
                            <button class="btn btn-sm btn-copy-inline" onclick="copyTweetText('${tweet.id}', this)">COPY</button>
                            <button class="btn btn-sm" onclick="previewTweet('${tweet.id}')" style="border-color: var(--text-muted); color: var(--text-muted);">PREVIEW</button>
                            <button class="btn btn-sm" onclick="editTweet('${tweet.id}')" style="border-color: var(--accent-cyan); color: var(--accent-cyan);">EDIT</button>
                            <button class="btn btn-sm" onclick="confirmDeleteTweet('${tweet.id}')" style="border-color: var(--accent-red); color: var(--accent-red);">DELETE</button>
                        </div>
                    </div>

                    <div class="tweet-code-block">
                        <div class="tweet-code-text" id="text-${tweet.id}">${escapeHtml(cleanText)}</div>
                    </div>

                    ${charLen > 0 ? `
                    <div class="char-counter">
                        <span class="count ${charClass}">${charLen}</span>
                        <span>/ 280</span>
                        <div class="progress-bar"><div class="fill ${charBarClass}" style="width: ${percent}%"></div></div>
                    </div>` : ''}

                    ${whyHtml}

                    <div class="tweet-meta">
                        <span>${hashtagsHtml} ${tweet.schedule_time ? 'SCHEDULE: ' + formatDate(tweet.schedule_time) : ''} | ${tweet.source || 'manual'}${tweet.source_url ? ' <a href="' + escapeHtml(tweet.source_url) + '" target="_blank" rel="noopener" class="tweet-source-link">[SOURCE]</a>' : ''}</span>
                    </div>

                    <div class="tweet-actions-right">
                        <button class="btn btn-sm" onclick="approveTweet('${tweet.id}')">APPROVE</button>
                        <button class="btn btn-sm" onclick="postTweet('${tweet.id}')">POST</button>
                        <button class="btn btn-sm" onclick="toggleManualPost('${tweet.id}', this)">MANUAL</button>
                        <button class="btn btn-sm" onclick="editSchedule('${tweet.id}')">SCHEDULE</button>
                    </div>
                </div>
            `;
        }

        // Direct copy — no modal, just toast. Works on HTTP and HTTPS.
        function copyTweetText(id, btn) {
            const el = document.getElementById(`text-${id}`);
            if (!el) return;
            const text = el.textContent;

            // Try modern clipboard API first
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(showCopied).catch(fallbackCopy);
            } else {
                fallbackCopy();
            }

            function showCopied() {
                const toast = document.getElementById('copied-toast');
                toast.classList.add('show');
                btn.textContent = '✓ COPIED';
                btn.classList.add('copied');
                setTimeout(() => {
                    toast.classList.remove('show');
                    btn.textContent = 'COPY';
                    btn.classList.remove('copied');
                }, 2000);
            }

            function fallbackCopy() {
                // For HTTP / non-secure contexts where clipboard API is blocked
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    showCopied();
                } catch (e) {
                    alert('Copy failed — select the text and press Ctrl+C');
                }
                document.body.removeChild(ta);
            }
        }

        function showCopyModal(text) {
            let modal = document.getElementById('copy-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'copy-modal';
                modal.className = 'copy-modal-overlay';
                modal.innerHTML = `
                    <div class="copy-modal">
                        <div class="copy-modal-header">
                            <span>> COPY_TWEET</span>
                            <button class="btn btn-sm" onclick="closeCopyModal()">X</button>
                        </div>
                        <div class="copy-modal-body">
                            <textarea class="copy-modal-textarea" id="copy-modal-textarea" readonly></textarea>
                        </div>
                        <div class="copy-modal-footer">
                            <span class="hint">SELECT_TEXT → CTRL+C</span>
                            <button class="btn btn-sm" onclick="closeCopyModal()">CLOSE</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) closeCopyModal();
                });
            }

            const textarea = document.getElementById('copy-modal-textarea');
            textarea.value = text;
            modal.classList.add('active');
            textarea.focus();
            textarea.select();
        }

        function closeCopyModal() {
            const modal = document.getElementById('copy-modal');
            if (modal) modal.classList.remove('active');
        }

        // Tweet preview
        function previewTweet(id) {
            let tweet = null;
            for (const date in allTweets) {
                const found = allTweets[date].find(t => t.id === id);
                if (found) { tweet = found; break; }
            }
            if (!tweet) return;

            // Clean text for preview
            const previewText = (tweet.text || '').replace(/\n>\n/g, '\n').replace(/>/g, '').trim();
            const text = previewText.substring(0, 280);
            const hashtags = tweet.hashtags || '';

            document.getElementById('preview-content').innerHTML = `
                <div class="preview-header">
                    <div class="avatar-placeholder">DB</div>
                    <div class="preview-user">
                        <div class="preview-name">danielbitpro</div>
                        <div class="preview-handle">@danielbitpro</div>
                    </div>
                </div>
                <div class="preview-text">${escapeHtml(text)}${hashtags ? '<br><br>' + escapeHtml(hashtags) : ''}</div>
                <div class="preview-meta">${new Date().toLocaleString()} · Web</div>
            `;
            showModal('preview-modal');
        }

        // Inline edit tweet
        let editingTweetId = null;

        function editTweet(id) {
            editingTweetId = id;
            let tweet = null;
            for (const date in allTweets) {
                const found = allTweets[date].find(t => t.id === id);
                if (found) { tweet = found; break; }
            }
            if (!tweet) return;

            // Clean the text — strip ">" blockquote markers before putting in the editor
            const cleanText = (tweet.text || '').replace(/\n>\n/g, '\n').replace(/>/g, '').trim();

            document.getElementById('edit-tweet-label').value = tweet.label || '';
            document.getElementById('edit-tweet-text').value = cleanText;
            document.getElementById('edit-tweet-why').value = tweet.why_it_works || '';
            document.getElementById('edit-tweet-time').value = tweet.schedule_time || '';
            document.getElementById('edit-tweet-hashtags').value = tweet.hashtags || '';
            updateEditCharCount();

        // Custom alert and confirm dialogs
        function customAlert(message) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay active';
            modal.innerHTML = `
                <div class="modal" style="max-width: 400px;">
                    <div class="modal-body" style="padding: 24px;">
                        <p style="text-align: center; color: var(--text-primary); font-size: 14px;">${message}</p>
                        <button class="btn btn-primary" style="width: 100%; margin-top: 16px;" onclick="this.closest('.modal-overlay').remove()">OK</button>
                    </div>
                </div>
            `;
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
            document.body.appendChild(modal);
        }

        function customConfirm(message) {
            return new Promise((resolve) => {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay active';
                modal.innerHTML = `
                    <div class="modal" style="max-width: 400px;">
                        <div class="modal-body" style="padding: 24px;">
                            <p style="text-align: center; color: var(--text-primary); font-size: 14px;">${message}</p>
                            <div style="display: flex; gap: 8px; margin-top: 16px;">
                                <button class="btn btn-primary" style="flex: 1;" id="confirm-yes">YES</button>
                                <button class="btn" style="flex: 1;" id="confirm-no">NO</button>
                            </div>
                        </div>
                    </div>
                `;
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) { modal.remove(); resolve(false); }
                });
                document.getElementById('confirm-yes').addEventListener('click', () => { modal.remove(); resolve(true); });
                document.getElementById('confirm-no').addEventListener('click', () => { modal.remove(); resolve(false); });
                document.body.appendChild(modal);
            });
        }

        function buildExport(tweets, format) {
            if (format === 'json') {
                return JSON.stringify(tweets, null, 2);
            }
            if (format === 'csv') {
                const header = 'id,label,text,hashtags,status,schedule_time,source,date\n';
                const rows = tweets.map(t => {
                    return [
                        t.id,
                        `"${(t.label || '').replace(/"/g, '""')}"`,
                        `"${(t.text || '').replace(/"/g, '""')}"`,
                        `"${(t.hashtags || '').replace(/"/g, '""')}"`,
                        t.status,
                        t.schedule_time || '',
                        t.source || '',
                        t.date || ''
                    ].join(',');
                });
                return header + rows.join('\n');
            }
            // raw format
            return tweets.map(t => {
                let line = (t.text || '');
                if (t.hashtags) line += '\n' + t.hashtags;
                return line;
            }).join('\n\n---\n\n');
        }

        function exportPipeline() {
            const pipelineTweets = [];
            for (const date in allTweets) {
                allTweets[date].forEach(t => {
                    if (t.status === 'approved') {
                        pipelineTweets.push(t);
                    }
                });
            }
            if (pipelineTweets.length === 0) {
                customAlert('No approved tweets to export in pipeline format');
                toggleExportMenu();
                return;
            }

            // Sort by section_number then date
            pipelineTweets.sort((a, b) => {
                const numA = (a.section_number || 0);
                const numB = (b.section_number || 0);
                if (numA !== numB) return numA - numB;
                return (a.date || '').localeCompare(b.date || '');
            });

            let content = '# X-proposed-tweets — Pipeline Export\n\n';
            let lastSection = 0;

            pipelineTweets.forEach((tweet, idx) => {
                const sectionNum = tweet.section_number || (idx + 1);
                if (sectionNum !== lastSection) {
                    content += `## ${sectionNum}. [${tweet.label || 'Untitled'}]\n`;
                    content += `| **Tweet:**\n`;
                }

                const cleanText = (tweet.text || '').replace(/\n>\n/g, '\n').replace(/>/g, '').trim();
                if (cleanText) {
                    content += `> ${cleanText}\n`;
                } else {
                    content += `> \n`;
                }
                content += `|\n`;

                if (tweet.why_it_works) {
                    content += `\n**Why it works:** ${tweet.why_it_works}\n\n`;
                }
                lastSection = sectionNum;
            });

            downloadFile(`pipeline-${new Date().toISOString().slice(0,10)}.md`, content);
            toggleExportMenu();
        }

        function downloadFile(filename, content) {

            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

                picker.className = 'emoji-picker';
                picker.id = currentEmojiPicker;
                picker.innerHTML = '<input type="text" class="emoji-search" placeholder="Search emoji..." aria-label="Search emoji"><div class="emoji-grid" id="' + currentEmojiPicker.replace('emoji-picker', 'emoji-grid') + '"></div>';
                document.body.appendChild(picker);
            }

            const grid = document.getElementById(textareaId.replace('-text', '-emoji-grid'));
            const textarea = document.getElementById(textareaId);
            const triggerBtn = textarea.parentElement.querySelector('.btn-emoji-trigger');
            const search = picker.querySelector('.emoji-search');

            // Clear search and grid
            search.value = '';
            grid.innerHTML = '';

            // Populate grid with all emojis
            for (const [category, emojis] of Object.entries(EMOJI_DATA)) {
                const catDiv = document.createElement('div');
                catDiv.className = 'emoji-category';
                catDiv.innerHTML = `<div class="emoji-category-label">${category}</div>`;

                const emojiRow = document.createElement('div');
                emojiRow.className = 'emoji-row';

                emojis.forEach(emoji => {
                    const btn = document.createElement('button');
                    btn.className = 'emoji-btn';
                    btn.textContent = emoji;
                    btn.title = emoji;
                    btn.onclick = () => insertEmoji(emoji);
                    emojiRow.appendChild(btn);
                });

                catDiv.appendChild(emojiRow);
                grid.appendChild(catDiv);
            }

            // Position the picker using fixed positioning relative to the trigger button
            const triggerRect = triggerBtn.getBoundingClientRect();
            picker.style.top = (triggerRect.bottom + window.scrollY + 4) + 'px';
            picker.style.left = (triggerRect.left + window.scrollX) + 'px';

            // Show picker
            picker.classList.add('active');
            search.focus();
        }

        function closeEmojiPicker() {
            // Close all pickers
            document.querySelectorAll('.emoji-picker').forEach(p => p.classList.remove('active'));
            currentEmojiTarget = null;
            currentEmojiPicker = null;
        }

        function filterEmojiPicker(prefix) {
            const picker = document.getElementById(`${prefix}-emoji-picker`);
            const search = picker.querySelector('.emoji-search');
            const grid = document.getElementById(`${prefix}-emoji-grid`);
            const query = search.value.toLowerCase().trim();

            // This is a simple filter - hide emojis that don't match
            // For a more sophisticated approach, we'd need emoji names/aliases
            // For now, we just show all emojis when no search term
            if (!query) {
                // Show all
                grid.querySelectorAll('.emoji-category').forEach(cat => {
                    cat.style.display = '';
                });
                return;
            }

            // Simple: show all emojis (real emoji search requires a mapping library)
            // For now, just show everything - the visual scan is fast enough
            grid.querySelectorAll('.emoji-category').forEach(cat => {
                cat.style.display = '';
            });
        }

        function insertEmoji(emoji) {
            if (!currentEmojiTarget) return;

            const textarea = document.getElementById(currentEmojiTarget);
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;

            // Insert emoji at cursor position
            textarea.value = text.substring(0, start) + emoji + text.substring(end);

            // Move cursor after the emoji
            const newPos = start + emoji.length;
            textarea.setSelectionRange(newPos, newPos);
            textarea.focus();

            // Update char count if applicable
            if (currentEmojiTarget === 'new-tweet-text') {
                updateNewCharCount();
            } else if (currentEmojiTarget === 'edit-tweet-text') {
                updateEditCharCount();
            }

            // Close picker
            closeEmojiPicker();
        }

        // Close emoji picker on outside click
        document.addEventListener('click', (e) => {
            if (currentEmojiPicker && !e.target.closest('.emoji-picker') && !e.target.closest('.btn-emoji-trigger')) {
                closeEmojiPicker();
            }
        });

        // Close emoji picker on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && currentEmojiPicker) {
                closeEmojiPicker();
            }
        });

        // Action toast — generic toast for POST, APPROVE, DELETE, etc.
        function showToast(message, type = 'success') {
            const toast = document.getElementById('action-toast');
            toast.textContent = message;
            toast.className = 'action-toast show ' + type;
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Check login on load
        checkLogin();
    
        // Handle image paste in textareas
        function handleImagePaste(event) {
            const items = event.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    event.preventDefault();
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const imgTag = '![' + (blob.name || 'image') + '](' + e.target.result + ')';
                        const textarea = event.target;
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        const text = textarea.value;
                        textarea.value = text.substring(0, start) + imgTag + text.substring(end);
                        textarea.selectionStart = textarea.selectionEnd = start + imgTag.length;
                        // Trigger input event to update char count
                        textarea.dispatchEvent(new Event('input'));
                    };
                    reader.readAsDataURL(blob);
                }
            }
        }
    </script>
</body>
</html>
