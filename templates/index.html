<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweet Reviewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Login Screen -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>> ACCESS_REQUIRED</h2>
            <input type="password" id="login-password" placeholder="Enter password..." autofocus>
            <button class="btn btn-primary" style="width:100%;" onclick="attemptLogin()">AUTHENTICATE</button>
            <div class="login-error" id="login-error">ACCESS DENIED</div>
        </div>
    </div>

    <!-- Main App -->
    <div class="header">
        <div class="header-terminal-bar">
            <span class="prompt">SYS://</span>
            <span>TWEET_REVIEWER</span>
            <span>|</span>
            <span>UPLINK:</span>
            <span id="uplink-status" class="status-ok">OK</span>
            <span>|</span>
            <span>TWEETS:</span>
            <span id="uplink-count">0</span>
            <span class="cursor-blink"></span>
        </div>
        <div class="header-main">
            <div class="header-title">
                <span class="prefix">&gt;</span> <span class="accent">TWEET</span>_REVIEWER
            </div>
            <div class="header-actions">
                <button class="btn" onclick="fetchTweets()">REFRESH</button>
                <button class="btn btn-primary" onclick="showModal('add-modal')">+ NEW</button>
                <div class="export-dropdown">
                    <button class="btn" onclick="toggleExportMenu()">EXPORT</button>
                    <div class="export-menu" id="export-menu">
                        <button onclick="exportApproved('raw')">→ APPROVED (RAW)</button>
                        <button onclick="exportApproved('csv')">→ APPROVED (CSV)</button>
                        <button onclick="exportAll('json')">→ ALL (JSON)</button>
                        <button onclick="exportAll('csv')">→ ALL (CSV)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Summary Bar -->
        <div id="summary-bar" class="summary-bar"></div>

        <!-- Search & Filter Bar -->
        <div class="search-bar">
            <input type="text" class="search-input" id="search-input" placeholder="> SEARCH TWEETS..." oninput="renderFilteredTweets()">
            <select class="filter-select" id="filter-status" onchange="renderFilteredTweets()">
                <option value="">[ALL STATUS]</option>
                <option value="draft">[DRAFT]</option>
                <option value="approved">[APPROVED]</option>
                <option value="scheduled">[SCHEDULED]</option>
                <option value="posted">[POSTED]</option>
                <option value="manual">[MANUAL]</option>
            </select>
            <select class="filter-select" id="filter-label" onchange="renderFilteredTweets()">
                <option value="">[ALL LABELS]</option>
            </select>
            <button class="btn btn-sm" onclick="toggleBulkMode()" id="bulk-mode-btn">[BULK]</button>
        </div>

        <!-- Bulk Action Bar -->
        <div class="bulk-bar" id="bulk-bar">
            <span><span class="bulk-count" id="bulk-count">0</span> selected</span>
            <div class="bulk-actions">
                <button class="btn btn-sm btn-danger" onclick="bulkDelete()">DELETE</button>
                <button class="btn btn-sm btn-cyan" onclick="bulkApprove()">APPROVE</button>
            </div>
        </div>

        <!-- Tweet List -->
        <div id="tweet-list"></div>
    </div>

    <!-- Add Tweet Modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <div class="modal-header">
                <span>> ADD_NEW_TWEET</span>
                <button class="btn btn-sm" onclick="hideModal('add-modal')">X</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Label</label>
                    <input type="text" id="new-tweet-label" placeholder="Local LLM">
                </div>
                <div class="form-group">
                    <label>Tweet Text</label>
                    <textarea id="new-tweet-text" placeholder="Enter your tweet..." oninput="updateNewCharCount()"></textarea>
                    <div class="char-counter" id="new-char-counter">
                        <span class="count" id="new-char-count">0</span>
                        <span>/ 280</span>
                        <div class="progress-bar"><div class="fill" id="new-char-bar"></div></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Why it works</label>
                    <textarea id="new-tweet-why" placeholder="Why this will resonate..." style="min-height: 60px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Schedule Time</label>
                    <input type="datetime-local" id="new-tweet-time">
                </div>
                <div class="form-group">
                    <label>Hashtags</label>
                    <input type="text" id="new-tweet-hashtags" placeholder="#LocalAI #LLM">
                </div>
                <button class="btn btn-primary" onclick="addTweet()">ADD_TWEET</button>
            </div>
        </div>
    </div>

    <!-- Copy Modal (for preview) -->
    <div class="copy-modal-overlay" id="copy-modal">
        <div class="copy-modal">
            <div class="copy-modal-header">
                <span>> COPY_TWEET</span>
                <button class="btn btn-sm" onclick="closeCopyModal()">X</button>
            </div>
            <div class="copy-modal-body">
                <textarea class="copy-modal-textarea" id="copy-modal-textarea" readonly></textarea>
            </div>
            <div class="copy-modal-footer">
                <span class="hint">SELECT_TEXT → CTRL+C</span>
                <button class="btn btn-sm" onclick="closeCopyModal()">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- Tweet Preview Modal -->
    <div class="modal-overlay" id="preview-modal">
        <div class="modal">
            <div class="modal-header">
                <span>> X_PREVIEW</span>
                <button class="btn btn-sm" onclick="hideModal('preview-modal')">X</button>
            </div>
            <div class="modal-body">
                <div class="preview-card" id="preview-content"></div>
            </div>
        </div>
    </div>

    <!-- Copied Toast -->
    <div class="copied-toast" id="copied-toast">> COPIED_TO_CLIPBOARD</div>

    <script>
        let allTweets = {};
        let bulkMode = false;

        // LOGIN
        let isLoggedIn = false;
        function checkLogin() {
            if (localStorage.getItem('reviewer_auth') === 'true') {
                isLoggedIn = true;
            }
            if (!isLoggedIn) {
                document.getElementById('login-overlay').classList.add('active');
                document.getElementById('login-password').focus();
            } else {
                init();
            }
        }

        function attemptLogin() {
            const password = document.getElementById('login-password').value;
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'authenticated') {
                    localStorage.setItem('reviewer_auth', 'true');
                    isLoggedIn = true;
                    document.getElementById('login-overlay').classList.remove('active');
                    init();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            })
            .catch(() => {
                document.getElementById('login-error').style.display = 'block';
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('login-overlay').classList.contains('active')) {
                attemptLogin();
            }
        });

        // INIT
        function init() {
            fetchTweets();
            populateLabels();
        }

        async function fetchTweets() {
            try {
                const response = await fetch('/api/tweets');
                const data = await response.json();
                allTweets = data;
                renderSummary(data);
                renderAllDates(data);
                document.getElementById('uplink-count').textContent = getTweetCount(data);
                document.getElementById('uplink-status').textContent = 'OK';
                document.getElementById('uplink-status').className = 'status-ok';
            } catch (e) {
                document.getElementById('uplink-status').textContent = 'ERR';
                document.getElementById('uplink-status').className = 'status-warn';
            }
        }

        function getTweetCount(data) {
            let count = 0;
            for (const date in data) count += data[date].length;
            return count;
        }

        function renderSummary(data) {
            const container = document.getElementById('summary-bar');
            let total = 0, draft = 0, approved = 0, posted = 0;
            for (const date in data) {
                data[date].forEach(t => {
                    total++;
                    if (t.status === 'draft') draft++;
                    else if (t.status === 'approved') approved++;
                    else if (t.status === 'posted') posted++;
                });
            }
            container.innerHTML = `
                <div class="summary-item total"><div class="count">${total}</div><div class="label">Total</div></div>
                <div class="summary-item draft"><div class="count">${draft}</div><div class="label">Drafts</div></div>
                <div class="summary-item approved"><div class="count">${approved}</div><div class="label">Approved</div></div>
                <div class="summary-item posted"><div class="count">${posted}</div><div class="label">Posted</div></div>
            `;
        }

        function populateLabels() {
            const select = document.getElementById('filter-label');
            const labels = new Set();
            for (const date in allTweets) {
                allTweets[date].forEach(t => {
                    if (t.label) labels.add(t.label);
                });
            }
            const current = select.value;
            select.innerHTML = '<option value="">[ALL LABELS]</option>';
            labels.forEach(label => {
                const opt = document.createElement('option');
                opt.value = label;
                opt.textContent = label;
                select.appendChild(opt);
            });
            select.value = current;
        }

        function renderFilteredTweets() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('filter-status').value;
            const labelFilter = document.getElementById('filter-label').value;

            let filtered = {};
            for (const date in allTweets) {
                const filteredTweets = allTweets[date].filter(t => {
                    if (statusFilter && t.status !== statusFilter) return false;
                    if (labelFilter && t.label !== labelFilter) return false;
                    if (search) {
                        const searchable = [t.text, t.label, t.hashtags, t.why_it_works].join(' ').toLowerCase();
                        if (!searchable.includes(search)) return false;
                    }
                    return true;
                });
                if (filteredTweets.length > 0) {
                    filtered[date] = filteredTweets;
                }
            }

            const container = document.getElementById('tweet-list');
            const dates = Object.keys(filtered).sort((a, b) => b.localeCompare(a));
            if (dates.length === 0) {
                container.innerHTML = '<div class="empty-state"><span class="prompt">&gt;</span> NO_MATCHING_TWEETS_FOUND<span class="cursor-blink"></span></div>';
                return;
            }
            container.innerHTML = dates.map(date => {
                const tweets = filtered[date];
                const displayDate = new Date(date + 'T00:00:00').toLocaleDateString('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
                return `
                    <div class="date-group">
                        <div class="date-header" onclick="toggleDate('${date}')">
                            <span class="toggle-icon">▼</span>
                            <span class="date-text">${displayDate}</span>
                            <span class="count-badge">${tweets.length} TWEETS</span>
                        </div>
                        <div class="date-tweets" id="tweets-${date}">
                            ${tweets.map(tweet => renderTweet(tweet)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderAllDates(data) {
            renderFilteredTweets();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderTweet(tweet) {
            const charLen = (tweet.text || '').length;
            const charClass = charLen <= 260 ? 'safe' : charLen <= 280 ? 'warn' : 'over';
            const charBarClass = charClass;
            const percent = Math.min((charLen / 280) * 100, 100);

            const labelHtml = tweet.label ? `<span class="tweet-label">${escapeHtml(tweet.label)}</span>` : '';
            const whyHtml = tweet.why_it_works ? `<div class="tweet-why"><strong>WHY_IT_WORKS:</strong> ${escapeHtml(tweet.why_it_works)}</div>` : '';
            const hashtagsHtml = tweet.hashtags ? `<span class="tweet-hashtags">${escapeHtml(tweet.hashtags)}</span>` : '';

            const bulkCheck = bulkMode ? `<input type="checkbox" class="tweet-checkbox" data-id="${tweet.id}" onchange="updateBulkCount()">` : '';

            const manualToggle = (tweet.status === 'manual') ?
                `<span style="color: var(--accent-white); margin-right: 8px;">MANUAL_POSTED</span>` : '';

            return `
                <div class="tweet-card ${tweet.status}">
                    <div class="tweet-card-header">
                        <div class="left">
                            ${bulkCheck}
                            ${labelHtml}
                            <span class="status-badge ${tweet.status}">${tweet.status}</span>
                            ${tweet.section_number ? `<span style="color: var(--text-dim);">#${tweet.section_number}</span>` : ''}
                        </div>
                        <div class="right">
                            ${manualToggle}
                            <button class="btn btn-sm" onclick="previewTweet('${tweet.id}')" style="border-color: var(--text-muted); color: var(--text-muted);">PREVIEW</button>
                            <button class="btn btn-sm" onclick="deleteTweet('${tweet.id}')" style="border-color: var(--accent-red); color: var(--accent-red);">DEL</button>
                        </div>
                    </div>

                    <div class="tweet-code-block">
                        <button class="btn-copy-block" onclick="copyTweetText('${tweet.id}', this)">COPY</button>
                        <div class="tweet-code-text" id="text-${tweet.id}">${escapeHtml(tweet.text)}</div>
                    </div>

                    ${charLen > 0 ? `
                    <div class="char-counter">
                        <span class="count ${charClass}">${charLen}</span>
                        <span>/ 280</span>
                        <div class="progress-bar"><div class="fill ${charBarClass}" style="width: ${percent}%"></div></div>
                    </div>` : ''}

                    ${whyHtml}

                    <div class="tweet-meta">
                        <span>${hashtagsHtml} ${tweet.schedule_time ? 'SCHEDULE: ' + formatDate(tweet.schedule_time) : ''} | ${tweet.source || 'manual'}</span>
                    </div>

                    <div class="tweet-actions">
                        <button class="btn btn-sm" onclick="approveTweet('${tweet.id}')">APPROVE</button>
                        <button class="btn btn-sm" onclick="postTweet('${tweet.id}')">POST</button>
                        <button class="btn btn-sm" onclick="toggleManualPost('${tweet.id}', this)">MANUAL_POST</button>
                        <button class="btn btn-sm" onclick="editSchedule('${tweet.id}')">EDIT_SCHEDULE</button>
                    </div>
                </div>
            `;
        }

        // Direct copy — no modal, just toast
        function copyTweetText(id, btn) {
            const el = document.getElementById(`text-${id}`);
            if (!el) return;
            const text = el.textContent;

            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('copied-toast');
                toast.classList.add('show');
                btn.textContent = '✓ COPIED';
                btn.classList.add('copied');
                setTimeout(() => {
                    toast.classList.remove('show');
                    btn.textContent = 'COPY';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                // Fallback: open modal if clipboard API fails
                showCopyModal(text);
            });
        }

        function showCopyModal(text) {
            let modal = document.getElementById('copy-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'copy-modal';
                modal.className = 'copy-modal-overlay';
                modal.innerHTML = `
                    <div class="copy-modal">
                        <div class="copy-modal-header">
                            <span>> COPY_TWEET</span>
                            <button class="btn btn-sm" onclick="closeCopyModal()">X</button>
                        </div>
                        <div class="copy-modal-body">
                            <textarea class="copy-modal-textarea" id="copy-modal-textarea" readonly></textarea>
                        </div>
                        <div class="copy-modal-footer">
                            <span class="hint">SELECT_TEXT → CTRL+C</span>
                            <button class="btn btn-sm" onclick="closeCopyModal()">CLOSE</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) closeCopyModal();
                });
            }

            const textarea = document.getElementById('copy-modal-textarea');
            textarea.value = text;
            modal.classList.add('active');
            textarea.focus();
            textarea.select();
        }

        function closeCopyModal() {
            const modal = document.getElementById('copy-modal');
            if (modal) modal.classList.remove('active');
        }

        // Tweet preview
        function previewTweet(id) {
            let tweet = null;
            for (const date in allTweets) {
                const found = allTweets[date].find(t => t.id === id);
                if (found) { tweet = found; break; }
            }
            if (!tweet) return;

            const text = (tweet.text || '').substring(0, 280);
            const hashtags = tweet.hashtags || '';

            document.getElementById('preview-content').innerHTML = `
                <div class="preview-header">
                    <div class="avatar-placeholder">DB</div>
                    <div class="preview-user">
                        <div class="preview-name">danielbitpro</div>
                        <div class="preview-handle">@danielbitpro</div>
                    </div>
                </div>
                <div class="preview-text">${escapeHtml(text)}${hashtags ? '<br><br>' + escapeHtml(hashtags) : ''}</div>
                <div class="preview-meta">${new Date().toLocaleString()} · Web</div>
            `;
            showModal('preview-modal');
        }

        // Char counter for new tweet
        function updateNewCharCount() {
            const text = document.getElementById('new-tweet-text').value;
            const len = text.length;
            const countEl = document.getElementById('new-char-count');
            const barEl = document.getElementById('new-char-bar');
            const percent = Math.min((len / 280) * 100, 100);

            countEl.textContent = len;
            barEl.style.width = percent + '%';

            if (len <= 260) {
                countEl.className = 'count safe';
                barEl.className = 'fill safe';
            } else if (len <= 280) {
                countEl.className = 'count warn';
                barEl.className = 'fill warn';
            } else {
                countEl.className = 'count over';
                barEl.className = 'fill over';
            }
        }

        async function addTweet() {
            const label = document.getElementById('new-tweet-label').value;
            const text = document.getElementById('new-tweet-text').value;
            const why = document.getElementById('new-tweet-why').value;
            const time = document.getElementById('new-tweet-time').value;
            const hashtags = document.getElementById('new-tweet-hashtags').value;

            if (!text) { alert('Enter tweet text'); return; }

            const response = await fetch('/api/tweets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, label: label || null, why_it_works: why || null, schedule_time: time || null, hashtags, source: 'manual' })
            });
            const tweet = await response.json();
            hideModal('add-modal');
            document.getElementById('new-tweet-label').value = '';
            document.getElementById('new-tweet-text').value = '';
            document.getElementById('new-tweet-why').value = '';
            document.getElementById('new-tweet-time').value = '';
            document.getElementById('new-tweet-hashtags').value = '';
            fetchTweets();
            populateLabels();
        }

        async function approveTweet(id) {
            await fetch(`/api/tweets/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'approved', schedule_time: null })
            });
            fetchTweets();
        }

        async function postTweet(id) {
            await fetch(`/api/tweets/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'posted' })
            });
            fetchTweets();
        }

        async function toggleManualPost(id, btn) {
            const card = btn.closest('.tweet-card');
            const isManual = card.classList.contains('manual');

            const newStatus = isManual ? 'draft' : 'manual';

            await fetch(`/api/tweets/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            fetchTweets();
        }

        async function editSchedule(id) {
            let tweet = null;
            for (const date in allTweets) {
                const found = allTweets[date].find(t => t.id === id);
                if (found) { tweet = found; break; }
            }
            if (!tweet) return;

            const newTime = prompt('Enter schedule time (YYYY-MM-DDTHH:MM):', tweet.schedule_time || '');
            if (newTime === null) return;

            if (newTime === '') {
                await fetch(`/api/tweets/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'draft', schedule_time: null })
                });
            } else {
                await fetch(`/api/tweets/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'scheduled', schedule_time: newTime })
                });
            }
            fetchTweets();
        }

        async function deleteTweet(id) {
            if (confirm('DELETE this tweet?')) {
                await fetch(`/api/tweets/${id}`, { method: 'DELETE' });
                fetchTweets();
                populateLabels();
            }
        }

        // Bulk operations
        function toggleBulkMode() {
            bulkMode = !bulkMode;
            const btn = document.getElementById('bulk-mode-btn');
            const bar = document.getElementById('bulk-bar');

            if (bulkMode) {
                btn.textContent = '[BULK ACTIVE]';
                btn.classList.add('btn-cyan');
                bar.classList.add('active');
            } else {
                btn.textContent = '[BULK]';
                btn.classList.remove('btn-cyan');
                bar.classList.remove('active');
            }
            renderFilteredTweets();
        }

        function updateBulkCount() {
            const checked = document.querySelectorAll('.tweet-checkbox:checked').length;
            document.getElementById('bulk-count').textContent = checked;
        }

        async function bulkDelete() {
            const checked = document.querySelectorAll('.tweet-checkbox:checked');
            if (checked.length === 0) return;
            if (!confirm(`Delete ${checked.length} tweets?`)) return;

            for (const cb of checked) {
                await fetch(`/api/tweets/${cb.dataset.id}`, { method: 'DELETE' });
            }
            toggleBulkMode();
            fetchTweets();
            populateLabels();
        }

        async function bulkApprove() {
            const checked = document.querySelectorAll('.tweet-checkbox:checked');
            if (checked.length === 0) return;

            for (const cb of checked) {
                await fetch(`/api/tweets/${cb.dataset.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'approved' })
                });
            }
            toggleBulkMode();
            fetchTweets();
        }

        // Export
        function toggleExportMenu() {
            const menu = document.getElementById('export-menu');
            menu.classList.toggle('active');
        }

        // Close export menu on outside click
        document.addEventListener('click', (e) => {
            const dropdown = document.querySelector('.export-dropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                document.getElementById('export-menu').classList.remove('active');
            }
        });

        function exportApproved(format) {
            const approved = [];
            for (const date in allTweets) {
                allTweets[date].forEach(t => {
                    if (t.status === 'approved') {
                        approved.push(t);
                    }
                });
            }
            if (approved.length === 0) { alert('No approved tweets to export'); return; }
            downloadFile(`approved-${new Date().toISOString().slice(0,10)}.${format}`, buildExport(approved, format));
            toggleExportMenu();
        }

        function exportAll(format) {
            const all = [];
            for (const date in allTweets) {
                allTweets[date].forEach(t => all.push(t));
            }
            if (all.length === 0) { alert('No tweets to export'); return; }
            downloadFile(`all-${new Date().toISOString().slice(0,10)}.${format}`, buildExport(all, format));
            toggleExportMenu();
        }

        function buildExport(tweets, format) {
            if (format === 'json') {
                return JSON.stringify(tweets, null, 2);
            }
            if (format === 'csv') {
                const header = 'id,label,text,hashtags,status,schedule_time,source,date\n';
                const rows = tweets.map(t => {
                    return [
                        t.id,
                        `"${(t.label || '').replace(/"/g, '""')}"`,
                        `"${(t.text || '').replace(/"/g, '""')}"`,
                        `"${(t.hashtags || '').replace(/"/g, '""')}"`,
                        t.status,
                        t.schedule_time || '',
                        t.source || '',
                        t.date || ''
                    ].join(',');
                });
                return header + rows.join('\n');
            }
            // raw format
            return tweets.map(t => {
                let line = (t.text || '');
                if (t.hashtags) line += '\n' + t.hashtags;
                return line;
            }).join('\n\n---\n\n');
        }

        function downloadFile(filename, content) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function toggleDate(date) {
            const tweets = document.getElementById(`tweets-${date}`);
            const header = tweets.previousElementSibling;
            if (tweets.classList.contains('collapsed')) {
                tweets.classList.remove('collapsed');
                header.classList.remove('collapsed');
            } else {
                tweets.classList.add('collapsed');
                header.classList.add('collapsed');
            }
        }

        function showModal(id) { document.getElementById(id).classList.add('active'); }
        function hideModal(id) { document.getElementById(id).classList.remove('active'); }
        function formatDate(dateStr) { if (!dateStr) return ''; return new Date(dateStr).toLocaleString(); }

        // Check login on load
        checkLogin();
    </script>
</body>
</html>
